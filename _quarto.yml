project:
  type: website
  output-dir: docs

website:
  title: "Matteo Ventura"
  # Aggiungiamo un footer per dare un aspetto finito
  page-footer:
    left: "© 2026 Matteo Ventura"
    right: "Built with [Quarto](https://quarto.org/)"
  
  navbar:
    background: primary # "primary" usa il colore principale del tema Flatly
    search: true        # Attiva la barra di ricerca interna (molto utile!)
    left:
      - href: index.qmd  # Assicurati che la home sia accessibile
        text: Home
      # - href: about.qmd
      #   text: About
      - href: publications.qmd
        text: Publications
      - href: courses.qmd
        text: Courses
      - href: contacts.qmd
        text: Contacts
    right:
      - icon: github
        href: https://github.com/MatteoVentura

format:
  html:
    theme: 
      light: flatly
      dark: darkly     # Permette agli utenti di switchare in modalità notte
    # Suggerimento font: Inter o Roboto sono più moderni del Lucida Console
    mainfont: "Inter, system-ui, sans-serif" 
    css: styles.css
    toc: true          # Attivalo per le pagine lunghe (es. corsi o pubblicazioni)